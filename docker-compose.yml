version: "3.8"

services:
  aria_node:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aria_node
    network_mode: host
    privileged: true
    tty: true
    stdin_open: true
    volumes:
      - /dev/input:/dev/input
      - /dev:/dev
    environment:
      - ROS_DOMAIN_ID=0
    command: /bin/bash
